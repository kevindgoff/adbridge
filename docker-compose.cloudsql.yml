services:
  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.2
    command:
      - "wodh-kdg:us-east4:adbridge"
      - "--address=0.0.0.0"
      - "--port=5432"
    volumes:
      - ./wodh-kdg-60aeb9504ef8.json:/credentials.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/credentials.json
    ports:
      - "5432:5432"
    restart: unless-stopped

  api:
    depends_on:
      - cloud-sql-proxy
